services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: lazybudget
      POSTGRES_USER: lazybudget
      POSTGRES_PASSWORD: lazybudget
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lazybudget"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "4242:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://lazybudget:lazybudget@postgres:5432/lazybudget}
      NODE_ENV: production
      # Example: comma-separated extra origins allowed to hit auth endpoints (e.g. a LAN hostname).
      # Override in .env.local or set TRUSTED_ORIGINS in your shell to change this.
      TRUSTED_ORIGINS: ${TRUSTED_ORIGINS:-http://hal:4242}
    env_file:
      - .env.local
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
